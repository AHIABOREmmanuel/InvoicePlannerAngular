<div class="pc-container">
  <div class="pc-content">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="text-primary">Liste des Prestations</h4>
      <button
        class="btn btn-primary d-flex align-items-center"
        (click)="addPrestation()"
      >
        <i class="pi pi-plus-circle me-2"></i> Ajouter une prestation
      </button>
    </div>

    <div class="row">
      <div
        *ngFor="let prestation of PrestationsResponse"
        class="col-md-6 col-lg-4 mb-4"
      >
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title text-primary">
              {{ prestation.designation }}
            </h5>
            <p class="card-text text-muted">{{ prestation.description }}</p>
            <p class="fw-bold">Prix : {{ prestation.prixTotal }} FCFA</p>

            <div class="d-flex justify-content-between align-items-center">
              <button
                class="btn btn-sm btn-primary"
                [routerLink]="[
                  '/dashboard/prestations/details-prestation',
                  prestation.trackingId
                ]"
              >
                Détails
              </button>

              <div>
                <a
                  [routerLink]="[
                    '/dashboard/prestations/edit',
                    prestation.trackingId
                  ]"
                  class="avtar avtar-s btn-link-success btn-pc-default me-2"
                >
                  <i class="bx bx-edit-alt f-20"></i>
                </a>
                <a
                  (click)="deletePrestation(prestation.trackingId)"
                  class="avtar avtar-s btn-link-danger btn-pc-default"
                >
                  <i class="bx bx-trash-alt f-20"></i>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div
      *ngIf="PrestationsResponse.length === 0"
      class="text-center text-muted mt-3"
    >
      Aucune prestation disponible.
    </div>
  </div>
</div>
